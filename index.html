<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Bairros Críticos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .filters { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 150px; display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #555; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-clear { background-color: #6c757d; color: white; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer; font-weight: bold; height: 35px; transition: 0.3s; }
        .btn-excel { background-color: #27ae60; color: white; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer; font-weight: bold; height: 35px; transition: 0.3s; }

        .summary { display: flex; gap: 15px; margin-bottom: 25px; }
        .card { flex: 1; padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .card-total { background: #1a73e8; } 
        .card-critico { background: #e74c3c; } 
        .card span { display: block; font-size: 28px; }
        .card .label-top { font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #ecf0f1; padding: 12px; text-align: left; border-bottom: 2px solid #bdc3c7; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; color: white !important; font-weight: bold; text-transform: uppercase; display: inline-block; min-width: 90px; text-align: center; }
        .bg-vermelho { background-color: #d93025 !important; }
        .bg-amarelo { background-color: #f9ab00 !important; color: #3c4043 !important; }
        .bg-verde { background-color: #1e8e3e !important; }

        .action-btns { display: flex; gap: 5px; }
        .btn-hist, .btn-vist, .btn-carimbo { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; color: white; font-weight: bold; text-decoration: none; }
        .btn-hist { background: #34495e; }
        .btn-vist { background: #27ae60; }
        .btn-carimbo { background: #f39c12; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 60%; border-radius: 12px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #999; }
        .carimbo-box { background: #f8f9fa; border: 1px solid #ddd; padding: 20px; font-family: monospace; white-space: pre-wrap; font-size: 13px; line-height: 1.4; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Análise de Bairros Críticos</h2>

    <div class="filters">
        <div class="filter-group"><label>DDD</label><select id="fDDD" onchange="filtrar()"><option value="">Todos</option></select></div>
        <div class="filter-group"><label>Cidade</label><select id="fCidade" onchange="filtrar()"><option value="">Todas</option></select></div>
        <div class="filter-group"><label>Site</label><input type="text" id="fSite" placeholder="Busca..." onkeyup="filtrar()"></div>
        <div class="btn-group">
            <button class="btn-clear" onclick="limparFiltros()">Limpar Filtros</button>
            <button class="btn-excel" onclick="exportarExcel()">Exportar .xls</button>
        </div>
    </div>

    <div class="summary">
        <div class="card card-total">
            <span class="label-top">Total Críticos (Trimestre)</span>
            <span id="countTotal" class="valor">0</span>
        </div>
        <div class="card card-critico">
            <span id="labelMesCard" class="label-top">MÊS ATUAL</span>
            <span id="countCritico" class="valor">0</span>
        </div>
    </div>

    <table id="tabelaAnalise">
        <thead>
            <tr>
                <th>DDD</th>
                <th>Cidade</th>
                <th>Site</th>
                <th id="labelMesTabela">% Mês Atual</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaBody"></tbody>
    </table>
</div>

<div id="modalCarimbo" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModalCarimbo()">&times;</span>
        <h3>Gerador de Carimbo TA</h3>
        <div id="carimboContent" class="carimbo-box"></div>
        <button class="btn-clear" style="margin-top:15px; background:#1a73e8" onclick="copiarCarimbo()">Copiar Texto</button>
    </div>
</div>

<div id="modalHistorico" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>
        <h3 id="modalTitulo">Histórico do Site</h3>
        <table style="width: 100%;">
            <thead><tr><th>DATA</th><th>TA</th><th>CAUSA</th><th>AÇÃO</th></tr></thead>
            <tbody id="histBody"></tbody>
        </table>
    </div>
</div>

<script>
    const urlBase = "https://docs.google.com/spreadsheets/d/1p7Q7vdCMvzWZNXlsemZ2BocFoAcji6LnHuI0yAP8jlw/export?format=csv";
    const gidPrincipal = "669721322";
    const gidCausas = "2146860357";

    let dadosSites = [];
    let dadosCausas = [];
    let m0 = "", m1 = "", m2 = "";
    let listaFiltradaTrimestre = [];

    function definirMeses() {
        const meses = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
        const d = new Date();
        m0 = meses[d.getMonth()];
        m1 = meses[(d.getMonth() - 1 + 12) % 12];
        m2 = meses[(d.getMonth() - 2 + 12) % 12];
        document.getElementById('labelMesCard').innerText = m0;
        document.getElementById('labelMesTabela').innerText = "% " + m0;
    }

    function parseNum(val) {
        if (!val || val === "-" || val === "") return 100;
        return parseFloat(val.toString().replace(',', '.').replace('%', '')) || 0;
    }

    function init() {
        definirMeses();
        Papa.parse(`${urlBase}&gid=${gidPrincipal}`, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                dadosSites = res.data.map(row => {
                    let newRow = {};
                    Object.keys(row).forEach(k => newRow[k.trim().toUpperCase()] = row[k]);
                    return newRow;
                });
                popularFiltros();
                filtrar();
            }
        });
        Papa.parse(`${urlBase}&gid=${gidCausas}`, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) { 
                dadosCausas = res.data.map(row => {
                    let newRow = {};
                    Object.keys(row).forEach(k => newRow[k.trim().toUpperCase()] = row[k]);
                    return newRow;
                });
            }
        });
    }

    function popularFiltros() {
        const ddds = [...new Set(dadosSites.map(i => i.DDD))].filter(Boolean).sort();
        const cidades = [...new Set(dadosSites.map(i => i.MUNICÍPIO || i.CIDADE))].filter(Boolean).sort();
        const selDDD = document.getElementById('fDDD');
        const selCid = document.getElementById('fCidade');
        ddds.forEach(d => selDDD.add(new Option(d, d)));
        cidades.forEach(c => selCid.add(new Option(c, c)));
    }

    function filtrar() {
        const ddd = document.getElementById('fDDD').value;
        const cid = document.getElementById('fCidade').value;
        const siteS = document.getElementById('fSite').value.toUpperCase();

        // LOGICA CORRIGIDA: Filtra sites que ficaram abaixo de 96.1 em QUALQUER um dos 3 meses
        listaFiltradaTrimestre = dadosSites.filter(i => {
            const v0 = parseNum(i["% " + m0] || i[m0]);
            const v1 = parseNum(i["% " + m1] || i[m1]);
            const v2 = parseNum(i["% " + m2] || i[m2]);

            // Verifica se foi crítico (< 96.1) no mês atual, mês passado ou mês retrasado
            const ehCriticoTrimestre = (v0 < 96.1 && v0 > 0) || (v1 < 96.1 && v1 > 0) || (v2 < 96.1 && v2 > 0);
            
            if (!ehCriticoTrimestre) return false;

            // Filtros de busca (DDD, Cidade, Site)
            const matchDDD = !ddd || i.DDD === ddd;
            const matchCid = !cid || (i.MUNICÍPIO === cid || i.CIDADE === cid);
            const matchSite = !siteS || (i.SITE && i.SITE.toUpperCase().includes(siteS));

            return matchDDD && matchCid && matchSite;
        });

        // Card Azul: Total de sites que falharam em algum momento do trimestre
        document.getElementById('countTotal').innerText = listaFiltradaTrimestre.length;
        renderizarTabela(listaFiltradaTrimestre);
    }

    function renderizarTabela(lista) {
        const corpo = document.getElementById('tabelaBody');
        corpo.innerHTML = '';
        let contMesAtual = 0;

        lista.forEach(item => {
            const percRaw = item["% " + m0] || item[m0] || "0%";
            const percNum = parseNum(percRaw);
            
            // Card Vermelho: Apenas sites que permanecem abaixo de 96.1 no Mês Atual
            if (percNum < 96.1 && percNum > 0) contMesAtual++;

            let classe = percNum < 96.1 ? "bg-vermelho" : (percNum < 98 ? "bg-amarelo" : "bg-verde");
            const linkV = (item["VISTORIA"] || "").trim();

            corpo.innerHTML += `<tr>
                <td>${item.DDD || '-'}</td>
                <td>${item.MUNICÍPIO || item.CIDADE || '-'}</td>
                <td><strong>${item.SITE}</strong></td>
                <td>${percRaw}</td>
                <td><span class="status-badge ${classe}">${percNum < 96.1 ? 'CRÍTICO' : 'OK'}</span></td>
                <td>
                    <div class="action-btns">
                        <button class="btn-hist" onclick="abrirHistorico('${item.SITE}')">Hist.</button>
                        <button class="btn-vist" onclick="window.open('${linkV}')">Vistoria</button>
                        <button class="btn-carimbo" onclick="gerarCarimbo('${item.SITE}')">Carimbo</button>
                    </div>
                </td>
            </tr>`;
        });
        document.getElementById('countCritico').innerText = contMesAtual;
    }

    function gerarCarimbo(siteID) {
        const atendimentos = dadosCausas
            .filter(e => (e.SITE || "").toString().toUpperCase() === siteID.toUpperCase())
            .slice(-3).reverse();

        let linhas = atendimentos.map(a => `${a.DATA || '-'}   ${a["TA CAUSA"] || '-'}   ${a.CAUSA || '-'}   ${a["AÇÃO REALIZADA"] || '-'}`).join('\n');

        const carimbo = `****************BAIRRO CRÍTICO***********
DATA   TA    CAUSA    AÇÃO REALIZADA
${linhas || 'Sem histórico recente.'}

Técnico:
Deslocamento:
************************************`;
        document.getElementById('carimboContent').innerText = carimbo;
        document.getElementById('modalCarimbo').style.display = "block";
    }

    function copiarCarimbo() {
        navigator.clipboard.writeText(document.getElementById('carimboContent').innerText);
        alert("Copiado!");
    }

    function exportarExcel() {
        const ws = XLSX.utils.json_to_sheet(listaFiltradaTrimestre);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Dados_Trimestre");
        XLSX.writeFile(wb, "Relatorio_Bairros_Criticos_Trimestre.xlsx");
    }

    function limparFiltros() {
        document.getElementById('fDDD').value = "";
        document.getElementById('fCidade').value = "";
        document.getElementById('fSite').value = "";
        filtrar();
    }

    function fecharModalCarimbo() { document.getElementById('modalCarimbo').style.display = "none"; }
    function abrirHistorico(siteID) {
        const histBody = document.getElementById('histBody');
        const eventos = dadosCausas.filter(e => (e.SITE || "").toString().toUpperCase() === siteID.toUpperCase());
        histBody.innerHTML = eventos.map(e => `<tr><td>${e.DATA}</td><td>${e["TA CAUSA"]}</td><td>${e.CAUSA}</td><td>${e["AÇÃO REALIZADA"]}</td></tr>`).join('');
        document.getElementById('modalHistorico').style.display = "block";
    }
    function fecharModal() { document.getElementById('modalHistorico').style.display = "none"; }
    
    window.onload = init;
</script>
</body>
</html>
