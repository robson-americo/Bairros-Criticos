<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Bairros Críticos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .filter-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; color: #5f6368; margin-bottom: 5px; }
        select, input { padding: 10px; border: 1px solid #dadce0; border-radius: 6px; outline: none; }
        
        .summary { display: flex; gap: 20px; margin-bottom: 25px; }
        .card { flex: 1; background: #fff; border: 1px solid #e0e0e0; padding: 20px; border-radius: 8px; text-align: center; border-top: 4px solid #1a73e8; }
        .card.alert { border-top-color: #d93025; }
        .card span { display: block; font-size: 28px; font-weight: bold; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; background: white; }
        th { background-color: #f8f9fa; color: #5f6368; font-weight: 600; text-transform: uppercase; font-size: 12px; padding: 12px; border-bottom: 2px solid #eee; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #3c4043; }
        tr:hover { background-color: #f1f3f4; }

        .btn-history { background: #1a73e8; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-history:hover { background: #1557b0; }
        
        #loading { text-align: center; color: #666; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Consulta de Bairros Críticos</h2>

    <div id="loading">Carregando dados da planilha...</div>

    <div class="filters">
        <div class="filter-group">
            <label>DDD</label>
            <select id="filterDDD" onchange="applyFilters()"><option value="">Todos</option></select>
        </div>
        <div class="filter-group">
            <label>Cidade</label>
            <select id="filterCidade" onchange="applyFilters()"><option value="">Todas</option></select>
        </div>
        <div class="filter-group">
            <label>Site</label>
            <input type="text" id="filterSite" placeholder="Ex: RJ..." onkeyup="applyFilters()">
        </div>
        <div class="filter-group">
            <label>Criticidade</label>
            <select id="filterCrit" onchange="applyFilters()">
                <option value="">Todas</option>
                <option value="CRÍTICO">CRÍTICO</option>
                <option value="NÃO CRÍTICO">NÃO CRÍTICO</option>
            </select>
        </div>
    </div>

    <div class="summary">
        <div class="card">Total de Sites Listados<span id="totalSites">0</span></div>
        <div class="card alert">Sites < 96% (Março)<span id="totalLow">0</span></div>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>DDD</th>
                <th>Município</th>
                <th>Site</th>
                <th>% Março</th>
                <th>Status</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // Link direto para o CSV da aba específica (gid 669721322)
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-3nl-LoJW7XThg1nyC2ngjbOZwFah_I0i3Vn-92jUUmC-TfFq_KgX15WtXr4ZKh8F34WjrPEEbdVK/pub?output=csv";
    let allData = [];

    function init() {
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                // Limpeza: remove espaços em branco dos nomes das colunas
                allData = results.data.map(row => {
                    const newRow = {};
                    Object.keys(row).forEach(key => {
                        newRow[key.trim()] = row[key].trim();
                    });
                    return newRow;
                });
                
                document.getElementById('loading').style.display = 'none';
                populateFilters();
                applyFilters();
            },
            error: function(err) {
                document.getElementById('loading').innerHTML = "Erro ao carregar dados. Verifique se a planilha está 'Publicada na Web'.";
                console.error(err);
            }
        });
    }

    function populateFilters() {
        const dddSet = new Set();
        const cidadeSet = new Set();

        allData.forEach(item => {
            if(item.DDD) dddSet.add(item.DDD);
            if(item.Município) cidadeSet.add(item.Município);
        });

        const dddSelect = document.getElementById('filterDDD');
        [...dddSet].sort().forEach(ddd => dddSelect.add(new Option(ddd, ddd)));

        const cidadeSelect = document.getElementById('filterCidade');
        [...cidadeSet].sort().forEach(cid => cidadeSelect.add(new Option(cid, cid)));
    }

    function applyFilters() {
        const ddd = document.getElementById('filterDDD').value;
        const cidade = document.getElementById('filterCidade').value;
        const site = document.getElementById('filterSite').value.toUpperCase();
        const crit = document.getElementById('filterCrit').value;

        const filtered = allData.filter(item => {
            const matchDDD = !ddd || item.DDD === ddd;
            const matchCidade = !cidade || item.Município === cidade;
            const matchSite = !site || (item.SITE && item.SITE.toUpperCase().includes(site));
            const matchCrit = !crit || item["Críticidade Atual"] === crit;
            return matchDDD && matchCidade && matchSite && matchCrit;
        });

        renderTable(filtered);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let lowCount = 0;

        data.forEach(item => {
            if (!item.SITE) return;

            // Tratamento da porcentagem (converte "95,50%" para número 95.5)
            const valorMarçoStr = item.MARÇO ? item.MARÇO.replace('%', '').replace(',', '.') : "0";
            const percAtual = parseFloat(valorMarçoStr);
            
            if (percAtual < 96) lowCount++;

            const row = `<tr>
                <td>${item.DDD || '-'}</td>
                <td>${item.Município || '-'}</td>
                <td><strong>${item.SITE}</strong></td>
                <td>${item.MARÇO || '0%'}</td>
                <td>${item["Críticidade Atual"] || '-'}</td>
                <td><button class="btn-history" onclick="verHistorico('${item.SITE}')">Histórico</button></td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('totalSites').innerText = data.length;
        document.getElementById('totalLow').innerText = lowCount;
    }

    function verHistorico(siteId) {
        alert("Consultando histórico do site: " + siteId);
    }

    window.onload = init;
</script>

</body>
</html>
