<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Bairros Críticos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .summary { display: flex; gap: 15px; margin-bottom: 25px; }
        .card { flex: 1; padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .card-total { background: #34495e; }
        .card-critico { background: #e74c3c; font-size: 16px; }
        .card span.contador { display: block; font-size: 32px; margin-top: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #ecf0f1; padding: 12px; text-align: left; border-bottom: 2px solid #bdc3c7; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; color: white; font-weight: bold; display: inline-block; }
        .bg-vermelho { background-color: #d93025; }
        .bg-verde { background-color: #1e8e3e; }
    </style>
</head>
<body>

<div class="container">
    <h2>Análise de Bairros Críticos (Trimestre Móvel)</h2>

    <div class="summary">
        <div class="card card-total">
            Total Sites Críticos (3 Meses)
            <span class="contador" id="countTotal">0</span>
        </div>
        
        <div class="card card-critico">
            <span id="labelMesCard">MÊS</span> <= 96%
            <span id="countCritico" class="contador">0</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>DDD</th>
                <th>Cidade</th>
                <th>Site</th>
                <th id="labelMesTabela">% Mês</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tabelaBody"></tbody>
    </table>
</div>

<script>
    const urlBase = "https://docs.google.com/spreadsheets/d/1p7Q7vdCMvzWZNXlsemZ2BocFoAcji6LnHuI0yAP8jlw/export?format=csv&gid=669721322";
    
    let mes0 = ""; // Atual
    let mes1 = ""; // Anterior
    let mes2 = ""; // Retrasado

    function definirMeses() {
        const nomes = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
        const hoje = new Date();
        
        mes0 = nomes[hoje.getMonth()];
        mes1 = nomes[(hoje.getMonth() - 1 + 12) % 12];
        mes2 = nomes[(hoje.getMonth() - 2 + 12) % 12];

        document.getElementById('labelMesCard').innerText = mes0;
        document.getElementById('labelMesTabela').innerText = "% " + mes0;
    }

    function converterValor(valor) {
        if (!valor) return 100;
        return parseFloat(valor.toString().replace(',', '.').replace('%', '')) || 0;
    }

    function init() {
        definirMeses();
        Papa.parse(urlBase, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(res) {
                processarDados(res.data);
            }
        });
    }

    function processarDados(dados) {
        const corpo = document.getElementById('tabelaBody');
        corpo.innerHTML = '';
        
        let totalSitesCriticosTrimestre = 0;
        let totalSitesCriticosMesAtual = 0;

        dados.forEach(row => {
            if (!row.SITE) return;

            const colunas = Object.keys(row);
            
            // Busca as colunas dos 3 meses
            const colMes0 = colunas.find(k => k.toUpperCase().includes(mes0));
            const colMes1 = colunas.find(k => k.toUpperCase().includes(mes1));
            const colMes2 = colunas.find(k => k.toUpperCase().includes(mes2));

            const v0 = converterValor(row[colMes0]);
            const v1 = converterValor(row[colMes1]);
            const v2 = converterValor(row[colMes2]);

            // REGRA: O site entra na lista se for <= 96 em QUALQUER um dos 3 meses
            const eCriticoNoTrimestre = (v0 <= 96.1 && v0 > 0) || (v1 <= 96.1 && v1 > 0) || (v2 <= 96.1 && v2 > 0);
            
            if (eCriticoNoTrimestre) {
                totalSitesCriticosTrimestre++;
                
                // Verifica se especificamente no mês atual ele é crítico
                const eCriticoAgora = (v0 <= 96.1 && v0 > 0);
                if (eCriticoAgora) totalSitesCriticosMesAtual++;

                corpo.innerHTML += `
                    <tr>
                        <td>${row.DDD || '-'}</td>
                        <td>${row.MUNICÍPIO || row.CIDADE || '-'}</td>
                        <td><strong>${row.SITE}</strong></td>
                        <td>${row[colMes0] || '0%'}</td>
                        <td>
                            <span class="status-badge ${eCriticoAgora ? 'bg-vermelho' : 'bg-verde'}">
                                ${eCriticoAgora ? 'CRÍTICO' : 'OK'}
                            </span>
                        </td>
                    </tr>`;
            }
        });

        document.getElementById('countTotal').innerText = totalSitesCriticosTrimestre;
        document.getElementById('countCritico').innerText = totalSitesCriticosMesAtual;
    }

    window.onload = init;
</script>
</body>
</html>
</script>
</body>
</html>
