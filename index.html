<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Bairros Críticos & Histórico</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .filters { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 180px; display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #555; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-clear { background-color: #6c757d; color: white; border: none; padding: 9px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.3s; height: 35px; }
        .summary { display: flex; gap: 15px; margin-bottom: 25px; }
        .card { flex: 1; padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .card-total { background: #34495e; }
        .card-critico { background: #e74c3c; }
        .card span.label-top { display: block; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; }
        .card span.valor { display: block; font-size: 32px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #ecf0f1; padding: 12px; text-align: left; border-bottom: 2px solid #bdc3c7; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; color: white !important; font-weight: bold; text-transform: uppercase; display: inline-block; min-width: 90px; text-align: center; }
        .bg-vermelho { background-color: #d93025 !important; }
        .bg-amarelo { background-color: #f9ab00 !important; color: #3c4043 !important; }
        .bg-verde { background-color: #1e8e3e !important; }
        .action-btns { display: flex; gap: 5px; }
        .btn-hist { background: #1a73e8; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-vist { color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; text-decoration: none; text-align: center; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 85%; border-radius: 12px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2>Análise de Bairros Críticos</h2>

    <div class="filters">
        <div class="filter-group"><label>DDD</label><select id="fDDD" onchange="filtrar()"><option value="">Todos</option></select></div>
        <div class="filter-group"><label>Cidade</label><select id="fCidade" onchange="filtrar()"><option value="">Todas</option></select></div>
        <div class="filter-group"><label>Site</label><input type="text" id="fSite" placeholder="Buscar site..." onkeyup="filtrar()"></div>
        <div class="filter-group"><label>Criticidade</label><select id="fCrit" onchange="filtrar()"><option value="">Todas</option><option value="CRÍTICO">CRÍTICO</option><option value="NÃO CRÍTICO">NÃO CRÍTICO</option></select></div>
        <button class="btn-clear" onclick="limparFiltros()">Limpar Filtros</button>
    </div>

    <div class="summary">
        <div class="card card-total">
            <span class="label-top">Sites último Trimestre</span>
            <span id="countTotal" class="valor">0</span>
        </div>
        <div class="card card-critico">
            <span id="labelMesCard" class="label-top">MÊS ATUAL</span>
            <span id="countCritico" class="valor">0</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>DDD</th>
                <th>Cidade</th>
                <th>Site</th>
                <th id="labelMesTabela">% Mês</th>
                <th>Status do Mês</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaBody"></tbody>
    </table>
</div>

<div id="modalHistorico" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>
        <h3 id="modalTitulo">Histórico do Site</h3>
        <div id="resumoCausas" class="causa-sumario"></div>
        <table id="tabelaHistorico">
            <thead>
                <tr>
                    <th>DATA</th>
                    <th>TA CAUSA</th>
                    <th>CAUSA</th>
                    <th>AÇÃO REALIZADA</th>
                </tr>
            </thead>
            <tbody id="histBody"></tbody>
        </table>
    </div>
</div>

<script>
    const urlBase = "https://docs.google.com/spreadsheets/d/1p7Q7vdCMvzWZNXlsemZ2BocFoAcji6LnHuI0yAP8jlw/export?format=csv";
    const gidPrincipal = "669721322";
    const gidCausas = "2146860357";

    let dadosSites = [];
    let dadosCausas = [];
    let mes0 = "", mes1 = "", mes2 = "";

    function definirMeses() {
        const meses = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
        const hoje = new Date();
        
        mes0 = meses[hoje.getMonth()];
        mes1 = meses[(hoje.getMonth() - 1 + 12) % 12];
        mes2 = meses[(hoje.getMonth() - 2 + 12) % 12];

        document.getElementById('labelMesCard').innerText = mes0;
        document.getElementById('labelMesTabela').innerText = "% " + mes0;
    }

    function converterValor(valor) {
        if (!valor || valor === "-") return 100;
        return parseFloat(valor.toString().replace(',', '.').replace('%', '')) || 0;
    }

    function init() {
        definirMeses();
        Papa.parse(`${urlBase}&gid=${gidPrincipal}`, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                dadosSites = res.data.map(row => {
                    let newRow = {};
                    Object.keys(row).forEach(k => newRow[k.trim().toUpperCase()] = row[k]);
                    return newRow;
                });
                popularFiltros();
                filtrar();
            }
        });
        Papa.parse(`${urlBase}&gid=${gidCausas}`, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) { 
                dadosCausas = res.data.map(row => {
                    let newRow = {};
                    Object.keys(row).forEach(k => newRow[k.trim().toUpperCase()] = row[k]);
                    return newRow;
                });
            }
        });
    }

    function popularFiltros() {
        const ddds = [...new Set(dadosSites.map(i => i.DDD))].filter(Boolean).sort();
        const cidades = [...new Set(dadosSites.map(i => i.MUNICÍPIO || i.CIDADE))].filter(Boolean).sort();
        const selDDD = document.getElementById('fDDD');
        const selCid = document.getElementById('fCidade');
        ddds.forEach(d => selDDD.add(new Option(d, d)));
        cidades.forEach(c => selCid.add(new Option(c, c)));
    }

    function filtrar() {
        const ddd = document.getElementById('fDDD').value;
        const cid = document.getElementById('fCidade').value;
        const siteS = document.getElementById('fSite').value.toUpperCase();
        const critF = document.getElementById('fCrit').value;

        const filtrados = dadosSites.filter(i => {
            const v0 = converterValor(i["% " + mes0] || i[mes0]);
            const v1 = converterValor(i["% " + mes1] || i[mes1]);
            const v2 = converterValor(i["% " + mes2] || i[mes2]);

            // Só entra na lista se foi crítico em algum dos 3 meses
            const criticoNoPeriodo = (v0 <= 96 && v0 > 0) || (v1 <= 96 && v1 > 0) || (v2 <= 96 && v2 > 0);

            return criticoNoPeriodo &&
                   (!ddd || i.DDD === ddd) && 
                   (!cid || (i.MUNICÍPIO === cid || i.CIDADE === cid)) && 
                   (!siteS || (i.SITE && i.SITE.toUpperCase().includes(siteS))) && 
                   (!critF || i["CRÍTICIDADE ATUAL"] === critF);
        });
        renderizarTabela(filtrados);
    }

    function renderizarTabela(lista) {
        const corpo = document.getElementById('tabelaBody');
        corpo.innerHTML = '';
        let contMesAtual = 0;

        lista.forEach(item => {
            const vAtualRaw = item["% " + mes0] || item[mes0] || "100%";
            const vAtualNum = converterValor(vAtualRaw);
            
            if(vAtualNum <= 96 && vAtualNum > 0) contMesAtual++;

            let classe = vAtualNum <= 96 ? "bg-vermelho" : (vAtualNum < 98 ? "bg-amarelo" : "bg-verde");
            const linkVistoria = (item["VISTORIA"] || "").trim();
            const temLink = (linkVistoria !== "" && linkVistoria !== "-");

            corpo.innerHTML += `<tr> 
                <td>${item.DDD || '-'}</td> 
                <td>${item.MUNICÍPIO || item.CIDADE || '-'}</td> 
                <td><strong>${item.SITE}</strong></td> 
                <td>${vAtualRaw}</td> 
                <td><span class="status-badge ${classe}">${vAtualNum <= 96 ? 'CRÍTICO' : 'OK'}</span></td> 
                <td> 
                    <div class="action-btns"> 
                        <button class="btn-hist" onclick="abrirHistorico('${item.SITE}')">Histórico</button> 
                        <button class="btn-vist" style="background-color: ${temLink ? '#27ae60' : '#7f8c8d'}" onclick="abrirVistoria('${linkVistoria}', '${item.SITE}')">Vistoria</button> 
                    </div> 
                </td> 
            </tr>`; 
        });
        document.getElementById('countTotal').innerText = lista.length;
        document.getElementById('countCritico').innerText = contMesAtual;
    }

    function limparFiltros() {
        document.getElementById('fDDD').value = ""; document.getElementById('fCidade').value = "";
        document.getElementById('fSite').value = ""; document.getElementById('fCrit').value = "";
        filtrar();
    }

    function abrirVistoria(url, siteID) {
        if (!url || url === "-" || url.trim() === "") alert(`Necessário realizar vistoria para o site ${siteID}.`);
        else window.open(url, '_blank');
    }

    function abrirHistorico(siteID) {
        const modal = document.getElementById('modalHistorico');
        const histBody = document.getElementById('histBody');
        document.getElementById('modalTitulo').innerText = `Histórico: ${siteID}`;
        const eventos = dadosCausas.filter(e => (e.SITE || "").toString().trim().toUpperCase() === siteID.toUpperCase());
        histBody.innerHTML = eventos.length ? '' : '<tr><td colspan="4">Sem eventos.</td></tr>';
        eventos.forEach(e => {
            histBody.innerHTML += `<tr><td>${e.DATA || '-'}</td><td>${e["TA CAUSA"] || '-'}</td><td>${e.CAUSA || '-'}</td><td>${e["AÇÃO REALIZADA"] || '-'}</td></tr>`;
        });
        modal.style.display = "block";
    }

    function fecharModal() { document.getElementById('modalHistorico').style.display = "none"; }
    window.onload = init;
</script>
</body>
</html>
