<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Bairros Críticos & Histórico</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* Filtros e Cards */
        .filters { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        .filter-group { flex: 1; min-width: 180px; display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #555; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        .summary { display: flex; gap: 15px; margin-bottom: 25px; }
        .card { flex: 1; padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .card-total { background: #34495e; }
        .card-critico { background: #e74c3c; }
        .card span { display: block; font-size: 28px; }

        /* Tabelas */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #ecf0f1; padding: 12px; text-align: left; border-bottom: 2px solid #bdc3c7; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }

        /* Status Badges (Semáforo) */
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; color: white !important; font-weight: bold; text-transform: uppercase; display: inline-block; min-width: 90px; text-align: center; }
        .bg-vermelho { background-color: #d93025 !important; }
        .bg-amarelo { background-color: #f9ab00 !important; color: #3c4043 !important; }
        .bg-verde { background-color: #1e8e3e !important; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 85%; border-radius: 12px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #999; }
        
        .causa-sumario { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        .causa-item { background: #fff; padding: 8px 15px; border: 1px solid #dee2e6; border-radius: 20px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Análise de Bairros Críticos</h2>

    <div class="filters">
        <div class="filter-group"><label>DDD</label><select id="fDDD" onchange="filtrar()"><option value="">Todos</option></select></div>
        <div class="filter-group"><label>Cidade</label><select id="fCidade" onchange="filtrar()"><option value="">Todas</option></select></div>
        <div class="filter-group"><label>Site</label><input type="text" id="fSite" placeholder="Buscar site..." onkeyup="filtrar()"></div>
        <div class="filter-group"><label>Criticidade</label><select id="fCrit" onchange="filtrar()"><option value="">Todas</option><option value="CRÍTICO">CRÍTICO</option><option value="NÃO CRÍTICO">NÃO CRÍTICO</option></select></div>
    </div>

    <div class="summary">
        <div class="card card-total">Total Sites Listados<span><id id="countTotal">0</id></span></div>
        <div class="card card-critico">Sites < 96% (Mês Atual)<span><id id="countCritico">0</id></span></div>
    </div>

    <table>
        <thead><tr><th>DDD</th><th>Cidade</th><th>Site</th><th>% Março</th><th>Status</th><th>Ação</th></tr></thead>
        <tbody id="tabelaBody"></tbody>
    </table>
</div>

<div id="modalHistorico" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>
        <h3 id="modalTitulo">Histórico do Site</h3>
        <div id="resumoCausas" class="causa-sumario"></div>
        <table id="tabelaHistorico">
            <thead>
                <tr>
                    <th>DATA</th>
                    <th>TA CAUSA</th>
                    <th>CAUSA</th>
                    <th>AÇÃO REALIZADA</th>
                </tr>
            </thead>
            <tbody id="histBody"></tbody>
        </table>
    </div>
</div>

<script>
    const urlBase = "https://docs.google.com/spreadsheets/d/1p7Q7vdCMvzWZNXlsemZ2BocFoAcji6LnHuI0yAP8jlw/export?format=csv";
    const gidPrincipal = "669721322";
    const gidCausas = "1336499849";

    let dadosSites = [];
    let dadosCausas = [];

    function init() {
        // Carrega aba Principal
        Papa.parse(`${urlBase}&gid=${gidPrincipal}`, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                // Normaliza colunas para facilitar busca
                dadosSites = res.data.map(row => {
                    let newRow = {};
                    Object.keys(row).forEach(k => newRow[k.trim().toUpperCase()] = row[k]);
                    return newRow;
                });
                popularFiltros();
                filtrar();
            }
        });
        // Carrega aba Causas Diárias
        Papa.parse(`${urlBase}&gid=${gidCausas}`, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) { 
                dadosCausas = res.data.map(row => {
                    let newRow = {};
                    Object.keys(row).forEach(k => newRow[k.trim().toUpperCase()] = row[k]);
                    return newRow;
                });
            }
        });
    }

    function popularFiltros() {
        const ddds = [...new Set(dadosSites.map(i => i.DDD))].filter(Boolean).sort();
        const cidades = [...new Set(dadosSites.map(i => i.MUNICÍPIO || i.CIDADE))].filter(Boolean).sort();
        ddds.forEach(d => document.getElementById('fDDD').add(new Option(d, d)));
        cidades.forEach(c => document.getElementById('fCidade').add(new Option(c, c)));
    }

    function filtrar() {
        const ddd = document.getElementById('fDDD').value;
        const cid = document.getElementById('fCidade').value;
        const site = document.getElementById('fSite').value.toUpperCase();
        const crit = document.getElementById('fCrit').value;

        const filtrados = dadosSites.filter(i => {
            return (!ddd || i.DDD === ddd) &&
                   (!cid || (i.MUNICÍPIO === cid || i.CIDADE === cid)) &&
                   (!site || (i.SITE && i.SITE.toUpperCase().includes(site))) &&
                   (!crit || i["CRÍTICIDADE ATUAL"] === crit);
        });
        renderizarTabela(filtrados);
    }

    function renderizarTabela(lista) {
        const corpo = document.getElementById('tabelaBody');
        corpo.innerHTML = '';
        let contAbaixo = 0;

        lista.forEach(item => {
            if(!item.SITE) return;
            const percRaw = item["% MARÇO"] || item["MARÇO"] || "0";
            const perc = parseFloat(percRaw.replace(',', '.').replace('%', ''));
            
            // Lógica do Semáforo
            let classe = "bg-verde";
            let statusTexto = item["CRÍTICIDADE ATUAL"] || "OK";

            if(item["CRÍTICIDADE ATUAL"] === "CRÍTICO" || perc < 94) {
                classe = "bg-vermelho";
                statusTexto = "CRÍTICO";
            } else if(perc >= 94 && perc < 96) {
                classe = "bg-amarelo";
                statusTexto = "ALERTA";
            }

            if(perc < 96 && perc > 0) contAbaixo++;

            corpo.innerHTML += `<tr>
                <td>${item.DDD || '-'}</td>
                <td>${item.MUNICÍPIO || item.CIDADE || '-'}</td>
                <td><strong>${item.SITE}</strong></td>
                <td>${percRaw}</td>
                <td><span class="status-badge ${classe}">${statusTexto}</span></td>
                <td><button class="btn-hist" onclick="abrirHistorico('${item.SITE}')" style="background:#1a73e8; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">Histórico</button></td>
            </tr>`;
        });
        document.getElementById('countTotal').innerText = lista.length;
        document.getElementById('countCritico').innerText = contAbaixo;
    }

    function abrirHistorico(siteID) {
    const modal = document.getElementById('modalHistorico');
    const histBody = document.getElementById('histBody');
    const resumo = document.getElementById('resumoCausas');
    
    document.getElementById('modalTitulo').innerText = `Histórico de Eventos: ${siteID}`;
    histBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Buscando...</td></tr>';
    resumo.innerHTML = '';

    // LOG DE DIAGNÓSTICO: Mostra no console do navegador (F12) o que o código está vendo
    console.log("Tentando encontrar Site:", siteID);
    if(dadosCausas.length > 0) {
        console.log("Colunas lidas na aba Causas:", Object.keys(dadosCausas));
    }

    // Filtra os eventos
    const eventos = dadosCausas.filter(e => {
        // Tentamos ler de 'SITE', 'Site' ou qualquer coluna que comece com 'SITE'
        const s = (e["SITE"] || e["Site"] || "").toString().trim().toUpperCase();
        return s === siteID.trim().toUpperCase();
    });

    if(eventos.length === 0) {
        // Mensagem de erro detalhada para ajudar você a identificar o problema
        histBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red; padding:20px;">
            ERRO DE VÍNCULO:<br>
            Não encontramos o site <strong>${siteID}</strong> na aba Causas Diárias.<br><br>
            <small>Verifique se existe uma coluna chamada <strong>SITE</strong> na aba de causas e se o nome do site está escrito igual.</small>
        </td></tr>`;
    } else {
        histBody.innerHTML = '';
        const contagemCausas = {};

        eventos.forEach(e => {
            const data = e["DATA"] || "-";
            const causa = e["CAUSA"] || "-";
            const taCausa = e["TA CAUSA"] || "-";
            const acao = e["AÇÃO REALIZADA"] || e["ACAO REALIZADA"] || "-";

            contagemCausas[causa] = (contagemCausas[causa] || 0) + 1;
            
            histBody.innerHTML += `<tr>
                <td>${data}</td>
                <td>${taCausa}</td>
                <td>${causa}</td>
                <td>${acao}</td>
            </tr>`;
        });

        resumo.innerHTML = `<div class="causa-item" style="background:#2c3e50; color:white;"><strong>Total: ${eventos.length}</strong></div>`;
        for (let c in contagemCausas) {
            const p = ((contagemCausas[c] / eventos.length) * 100).toFixed(1);
            resumo.innerHTML += `<div class="causa-item">${c}: <strong>${contagemCausas[c]} (${p}%)</strong></div>`;
        }
    }
    modal.style.display = "block";
}
    function fecharModal() { document.getElementById('modalHistorico').style.display = "none"; }
    window.onclick = function(event) { if (event.target == document.getElementById('modalHistorico')) fecharModal(); }

    window.onload = init;
</script>
</body>
</html>
