<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Bairros Críticos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .summary { display: flex; gap: 15px; margin-bottom: 25px; }
        .card { flex: 1; padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .card-total { background: #34495e; }
        /* Ajuste do Card Crítico */
        .card-critico { background: #e74c3c; font-size: 16px; }
        .card-critico span.mes-label { display: inline; text-transform: uppercase; }
        .card-critico span.contador { display: block; font-size: 32px; margin-top: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #ecf0f1; padding: 12px; text-align: left; border-bottom: 2px solid #bdc3c7; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; color: white; font-weight: bold; display: inline-block; text-align: center; }
        .bg-vermelho { background-color: #d93025; }
        .bg-verde { background-color: #1e8e3e; }
    </style>
</head>
<body>

<div class="container">
    <h2>Análise de Bairros Críticos</h2>

    <div class="summary">
        <div class="card card-total">Total Sites Listados<span style="display:block; font-size:32px;" id="countTotal">0</span></div>
        
        <div class="card card-critico">
            <span id="labelMesCard" class="mes-label">MÊS</span> <= 96%
            <span id="countCritico" class="contador">0</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>DDD</th>
                <th>Cidade</th>
                <th>Site</th>
                <th id="labelMesTabela">% Mês</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tabelaBody"></tbody>
    </table>
</div>

<script>
    const urlBase = "https://docs.google.com/spreadsheets/d/1p7Q7vdCMvzWZNXlsemZ2BocFoAcji6LnHuI0yAP8jlw/export?format=csv&gid=669721322";
    let mesAtualNome = "";

    function definirMesEIniciar() {
        const meses = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
        const dataHoje = new Date();
        mesAtualNome = meses[dataHoje.getMonth()];

        // Atualiza os textos dos Cards e Tabela
        document.getElementById('labelMesCard').innerText = mesAtualNome;
        document.getElementById('labelMesTabela').innerText = "% " + mesAtualNome;

        carregarDados();
    }

    function carregarDados() {
        Papa.parse(urlBase, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(res) {
                renderizar(res.data);
            }
        });
    }

    function renderizar(dados) {
        const corpo = document.getElementById('tabelaBody');
        corpo.innerHTML = '';
        let contCritico = 0;

        dados.forEach(row => {
            // Normaliza as chaves para facilitar a busca
            const colunas = Object.keys(row);
            
            // BUSCA AUTOMÁTICA: Procura qualquer coluna que tenha o nome do mês (ex: "ABRIL" ou "% ABRIL")
            const chaveMes = colunas.find(k => k.toUpperCase().includes(mesAtualNome));
            
            const valorRaw = chaveMes ? row[chaveMes] : "0%";
            const valorNum = parseFloat(valorRaw.replace(',', '.').replace('%', '')) || 0;

            if (row.SITE) {
                let eCritico = valorNum <= 96 && valorNum > 0;
                if (eCritico) contCritico++;

                corpo.innerHTML += `
                    <tr>
                        <td>${row.DDD || '-'}</td>
                        <td>${row.MUNICÍPIO || row.CIDADE || '-'}</td>
                        <td><strong>${row.SITE}</strong></td>
                        <td>${valorRaw}</td>
                        <td>
                            <span class="status-badge ${eCritico ? 'bg-vermelho' : 'bg-verde'}">
                                ${eCritico ? 'CRÍTICO' : 'OK'}
                            </span>
                        </td>
                    </tr>`;
            }
        });

        document.getElementById('countTotal').innerText = dados.length;
        document.getElementById('countCritico').innerText = contCritico;
    }

    // Inicia tudo automaticamente ao carregar a página
    window.onload = definirMesEIniciar;
</script>
</body>
</html>
</body>
</html>
