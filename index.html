<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Bairros Críticos & Evolução</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .filters { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 180px; display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #555; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        .summary { display: flex; gap: 15px; margin-bottom: 25px; }
        .card { flex: 1; padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .card-total { background: #34495e; }
        .card-critico { background: #e74c3c; }
        .card span { display: block; font-size: 28px; }

        /* Estilo do Gráfico */
        .chart-container { width: 100%; max-width: 600px; margin: 0 auto 30px auto; height: 300px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #ecf0f1; padding: 12px; text-align: left; border-bottom: 2px solid #bdc3c7; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }

        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; color: white !important; font-weight: bold; text-transform: uppercase; display: inline-block; min-width: 90px; text-align: center; }
        .bg-vermelho { background-color: #d93025 !important; }
        .bg-amarelo { background-color: #f9ab00 !important; color: #3c4043 !important; }
        .bg-verde { background-color: #1e8e3e !important; }

        .action-btns { display: flex; gap: 5px; }
        .btn-hist { background: #1a73e8; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-vist { color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; text-decoration: none; text-align: center; }
        
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 85%; border-radius: 12px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2>Análise de Bairros Críticos</h2>

    <div class="filters">
        <div class="filter-group"><label>DDD</label><select id="fDDD" onchange="filtrar()"><option value="">Todos</option></select></div>
        <div class="filter-group"><label>Cidade</label><select id="fCidade" onchange="filtrar()"><option value="">Todas</option></select></div>
        <div class="filter-group"><label>Site</label><input type="text" id="fSite" placeholder="Buscar site..." onkeyup="filtrar()"></div>
        <button class="btn-clear" onclick="limparFiltros()" style="background:#6c757d; color:white; border:none; padding:9px; border-radius:4px; cursor:pointer;">Limpar Filtros</button>
    </div>

    <div class="summary">
        <div class="card card-total">Total Sites Listados<span><id id="countTotal">0</id></span></div>
        <div class="card card-critico">Sites Críticos (Mês Atual)<span><id id="countCritico">0</id></span></div>
    </div>

    <div class="chart-container">
        <canvas id="graficoEvolucao"></canvas>
    </div>

    <table>
        <thead><tr><th>DDD</th><th>Cidade</th><th>Site</th><th>% Março</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="tabelaBody"></tbody>
    </table>
</div>

<div id="modalHistorico" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>
        <h3 id="modalTitulo">Histórico</h3>
        <table id="tabelaHistorico">
            <thead><tr><th>DATA</th><th>CAUSA</th><th>AÇÃO</th></tr></thead>
            <tbody id="histBody"></tbody>
        </table>
    </div>
</div>

<script>
    const urlBase = "https://docs.google.com/spreadsheets/d/1p7Q7vdCMvzWZNXlsemZ2BocFoAcji6LnHuI0yAP8jlw/export?format=csv";
    const gidPrincipal = "669721322";
    const gidCausas = "2146860357";

    let dadosSites = [];
    let dadosCausas = [];
    let meuGrafico = null; // Variável para controlar a instância do gráfico

    function init() {
        Papa.parse(`${urlBase}&gid=${gidPrincipal}`, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                dadosSites = res.data.map(row => {
                    let newRow = {};
                    Object.keys(row).forEach(k => newRow[k.trim().toUpperCase()] = row[k]);
                    return newRow;
                });
                popularFiltros();
                filtrar();
            }
        });
        // Carrega causas...
    }

    function popularFiltros() {
        const ddds = [...new Set(dadosSites.map(i => i.DDD))].filter(Boolean).sort();
        const selDDD = document.getElementById('fDDD');
        ddds.forEach(d => selDDD.add(new Option(d, d)));
    }

    function filtrar() {
        const ddd = document.getElementById('fDDD').value;
        const site = document.getElementById('fSite').value.toUpperCase();
        
        const filtrados = dadosSites.filter(i => {
            return (!ddd || i.DDD === ddd) && (!site || (i.SITE && i.SITE.toUpperCase().includes(site)));
        });

        renderizarTabela(filtrados);
        atualizarGrafico(filtrados);
    }

    function atualizarGrafico(lista) {
        let criticosJan = 0;
        let criticosAtual = 0;

        lista.forEach(item => {
            // Lógica para Janeiro
            const percJan = parseFloat((item["JANEIRO"] || "0").replace(',', '.').replace('%', ''));
            if (percJan <= 96 && percJan > 0) criticosJan++;

            // Lógica para Março (Atual)
            const percMar = parseFloat((item["% MARÇO"] || item["MARÇO"] || "0").replace(',', '.').replace('%', ''));
            if (percMar <= 96 && percMar > 0) criticosAtual++;
        });

        const ctx = document.getElementById('graficoEvolucao').getContext('2d');
        
        if (meuGrafico) meuGrafico.destroy(); // Destrói gráfico anterior antes de criar novo

        meuGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Janeiro', 'Mês Atual (Março)'],
                datasets: [{
                    label: 'Quantidade de Sites Críticos',
                    data: [criticosJan, criticosAtual],
                    backgroundColor: ['#34495e', '#e74c3c'],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
                plugins: { legend: { display: false }, title: { display: true, text: 'Evolução da Criticidade' } }
            }
        });
    }

    function renderizarTabela(lista) {
        const corpo = document.getElementById('tabelaBody');
        corpo.innerHTML = '';
        let contAbaixo = 0;

        lista.forEach(item => {
            if(!item.SITE) return;
            const percRaw = item["% MARÇO"] || item["MARÇO"] || "0";
            const perc = parseFloat(percRaw.replace(',', '.').replace('%', ''));
            
            let classe = perc <= 96 ? "bg-vermelho" : (perc < 98 ? "bg-amarelo" : "bg-verde");
            if(perc <= 96 && perc > 0) contAbaixo++;

            const linkVistoria = (item["VISTORIA"] || "").trim();
            const corVist = (linkVistoria !== "" && linkVistoria !== "-") ? "#27ae60" : "#7f8c8d";

            corpo.innerHTML += `<tr>
                <td>${item.DDD || '-'}</td>
                <td>${item.MUNICÍPIO || '-'}</td>
                <td><strong>${item.SITE}</strong></td>
                <td>${percRaw}</td>
                <td><span class="status-badge ${classe}">${perc <= 96 ? 'CRÍTICO' : 'OK'}</span></td>
                <td>
                    <div class="action-btns">
                        <button class="btn-hist" onclick="alert('Ver histórico...')">Histórico</button>
                        <button class="btn-vist" style="background:${corVist}" onclick="window.open('${linkVistoria}')">Vistoria</button>
                    </div>
                </td>
            </tr>`;
        });
        document.getElementById('countTotal').innerText = lista.length;
        document.getElementById('countCritico').innerText = contAbaixo;
    }

    function limparFiltros() { 
        document.getElementById('fDDD').value = ""; 
        document.getElementById('fSite').value = ""; 
        filtrar(); 
    }

    window.onload = init;
</script>
</body>
</html>
